version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - .:/workspace
    depends_on:
      - db
      - redis

  db:
    image: postgres:14.2
    environment:
      POSTGRES_USER: cadence
      POSTGRES_PASSWORD: cadence
      POSTGRES_DB: cadence
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
